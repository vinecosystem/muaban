<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>muaban • Viction</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    html, body { height:100%; }
    body { display:flex; flex-direction:column; }
    main { flex:1 0 auto; }
    .hidden { display:none !important; }
    .header-right { display:flex; align-items:center; gap:.5rem; }
    .price-chip { padding:.25rem .5rem; border:1px solid #cbd5e1; border-radius:.5rem; font-variant-numeric:tabular-nums; background:#fff; }
    .footer-nav { display:flex; gap:.75rem; flex-wrap:wrap; align-items:center }
  </style>
</head>
<body>
  <!-- =================== HEADER =================== -->
  <header class="site-header">
    <div class="container nav">
      <div class="brand">
        <img src="logo.png" alt="VIN" class="logo" />
        <div class="brand-text">
          <h1 class="brand-title">muaban</h1>
          <p class="brand-sub">on-chain commerce • Viction</p>
        </div>
      </div>
      <div class="header-right">
        <div class="price-chip">1 VIN = <span id="vinUsdTop">Loading…</span></div>
        <button id="btnConnect" class="btn primary">Kết nối ví</button>
        <button id="btnDisconnect" class="btn ghost hidden">Ngắt</button>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- =================== WALLET BAR (compact) =================== -->
    <section id="walletBar" class="card hidden">
      <div class="wallet-row">
        <div class="wallet-col">
          <a id="accountShort" class="badge mono" target="_blank" rel="noopener"></a>
        </div>
        <div class="wallet-col right">
          <span id="vinBalance" class="badge">—</span>
          <span id="vicBalance" class="badge">—</span>
        </div>
      </div>
      <div class="wallet-actions">
        <div class="left">
          <span id="statusLine" class="small muted"></span>
        </div>
        <div class="right" style="display:flex; gap:.5rem;">
          <button id="btnRegister" class="btn hidden">Đăng ký</button>
          <button id="btnCreateProduct" class="btn hidden">Tạo sản phẩm</button>
        </div>
      </div>
    </section>

    <!-- =================== MARKET (ai cũng xem được) =================== -->
    <section id="marketSection" class="section">
      <h2 class="section-title">Sản phẩm</h2>

      <div class="filters">
        <input id="searchInput" type="search" class="input" placeholder="Tìm sản phẩm…" />
        <input id="sellerFilter" type="search" class="input" placeholder="Lọc theo ví người bán (tuỳ chọn)" />
        <input id="minPriceUsd" type="number" step="0.01" min="0" class="input" placeholder="Giá từ (USD)" />
        <input id="maxPriceUsd" type="number" step="0.01" min="0" class="input" placeholder="đến (USD)" />
        <button id="btnReload" class="btn ghost">Tải lại</button>
      </div>

      <div id="productList" class="grid"></div>
      <p id="emptyProducts" class="muted" style="margin-top:.5rem;">Chưa có sản phẩm.</p>

      <!-- Product Card Template -->
      <template id="tplProductCard">
        <article class="card product">
          <div class="p-img-wrap">
            <img class="p-img" alt="" />
          </div>
          <div class="p-body">
            <h3 class="p-title"></h3>
            <p class="p-desc"></p>
            <div class="p-meta">
              <span class="p-price"></span>
              <span class="p-tax"></span>
              <span class="p-delivery"></span>
            </div>
            <div class="p-seller">
              <a class="p-seller-addr mono" target="_blank" rel="noopener"></a>
            </div>
            <!-- Nút mua chỉ hiện khi ví đã đăng ký (app.js quyết định) -->
            <button class="btn buy-btn hidden">Mua</button>
          </div>
        </article>
      </template>
    </section>

    <!-- =================== CREATE PRODUCT MODAL =================== -->
    <div id="createModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="createTitle">
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="createTitle">Tạo sản phẩm</h3>
          <button id="createClose" class="icon-btn" aria-label="Đóng">×</button>
        </div>
        <div class="modal-body">
          <form id="createForm" class="grid grid-2">
            <label>Tên hàng
              <input id="pName" class="input" required maxlength="64" />
            </label>
            <label>Ảnh (IPFS CID)
              <input id="pImageCID" class="input" required />
            </label>
            <label>Mô tả (IPFS CID)
              <input id="pDescCID" class="input" required />
            </label>
            <label>Giá (USD)
              <input id="pPriceUsd" class="input" type="number" step="0.01" min="0.01" required />
            </label>
            <label>Phí ship (USD)
              <input id="pShippingUsd" class="input" type="number" step="0.01" min="0" value="0" />
            </label>
            <label>Thuế (%)
              <input id="pTaxPercent" class="input" type="number" step="0.01" min="0" max="100" value="0" />
            </label>
            <label>Thời hạn giao (ngày)
              <input id="pDeliveryDays" class="input" type="number" min="1" required />
            </label>
            <label>Tồn kho
              <input id="pStock" class="input" type="number" min="0" required />
            </label>
            <label>Ví doanh thu
              <input id="pRevenueWallet" class="input mono" required />
            </label>
            <label>Ví thuế
              <input id="pTaxWallet" class="input mono" required />
            </label>
            <label>Ví phí ship (tuỳ chọn)
              <input id="pShippingWallet" class="input mono" placeholder="0x… hoặc để trống" />
            </label>
            <label>Khoá công khai mã hoá (bytes hex)
              <input id="pSellerPubKey" class="input mono" required placeholder="0x…" />
            </label>
            <label class="row center">
              <input id="pActive" type="checkbox" checked /> Đang bán
            </label>
          </form>
        </div>
        <div class="modal-foot">
          <button id="createSubmit" class="btn primary">Đăng sản phẩm</button>
          <button id="createCancel" class="btn ghost">Hủy</button>
        </div>
      </div>
    </div>

    <!-- =================== BUY MODAL =================== -->
    <div id="buyModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="buyTitle">
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="buyTitle">Mua hàng</h3>
          <button id="buyClose" class="icon-btn" aria-label="Đóng">×</button>
        </div>
        <div class="modal-body">
          <div class="row"><label class="lbl">Sản phẩm</label><div id="buyName" class="val"></div></div>
          <div class="row"><label class="lbl">Giá (USD)</label><div id="buyPriceUsd" class="val"></div></div>
          <div class="row"><label class="lbl">Phí ship (USD)</label><div id="buyShipUsd" class="val"></div></div>
          <div class="row"><label class="lbl">Thuế (%)</label><div id="buyTaxRate" class="val"></div></div>
          <div class="row"><label class="lbl">Số lượng</label><input id="buyQty" type="number" class="input" min="1" value="1" /></div>
          <hr />
          <div class="row"><label class="lbl">Tổng (USD)</label><div id="buyTotalUsd" class="val mono"></div></div>
          <div class="row"><label class="lbl">Thanh toán (VIN)</label><div id="buyTotalVin" class="val mono"></div></div>
          <hr />
          <h4>Thông tin giao hàng</h4>
          <div class="grid grid-2">
            <label>Họ tên
              <input id="shipName" class="input" required />
            </label>
            <label>Số điện thoại
              <input id="shipPhone" class="input" required />
            </label>
          </div>
          <label>Địa chỉ giao hàng
            <input id="shipAddress" class="input" required />
          </label>
          <label>Ghi chú
            <input id="shipNote" class="input" />
          </label>
        </div>
        <div class="modal-foot">
          <button id="buySubmit" class="btn primary">Xác nhận thanh toán</button>
          <button id="buyCancel" class="btn ghost">Hủy</button>
        </div>
      </div>
    </div>

    <!-- =================== TOAST =================== -->
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  </main>

  <!-- =================== FOOTER =================== -->
  <footer class="site-footer">
    <div class="container footer-inner" style="gap:.75rem; justify-content:space-between">
      <div class="footer-nav">
        <a class="link" href="https://vicscan.xyz/address/0xe01e2213A899E9B3b1921673D2d13a227a8df638" target="_blank" rel="noopener">Contract</a>
        <a class="link" href="https://vicscan.xyz/token/0x941F63807401efCE8afe3C9d88d368bAA287Fac4" target="_blank" rel="noopener">VIN Token</a>
        <a class="link" href="https://frollswap.com" target="_blank">Swap VIN/VIC</a>
        <a class="link" href="https://github.com/vinecosystem/muaban" target="_blank" rel="noopener">Hướng dẫn</a>
      </div>
    </div>
  </footer>

  <!-- App -->
  <script defer src="app.js"></script>

  <!-- VIN/USD (VIN = VIC × 100) hiển thị ở đầu -->
  <script>
    async function fetchVinUsdTop() {
      const el = document.getElementById('vinUsdTop');
      try {
        const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=VICUSDT', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const { price } = await res.json();
        const vicUsd = parseFloat(price);
        const vinUsd = vicUsd * 100;
        el.textContent = isFinite(vinUsd) ? (vinUsd.toFixed(4) + ' USD') : 'N/A';
      } catch (e) { el.textContent = 'N/A'; }
    }
    fetchVinUsdTop();
    setInterval(fetchVinUsdTop, 60000);
  </script>
</body>
</html>
