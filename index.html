<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>muaban • Viction</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- =================== HEADER =================== -->
  <header class="header container">
    <div class="brand">
      <img src="logo.png" alt="muaban" class="logo-img" />
      <div class="brand-text">
        <h1 class="logo">muaban</h1>
        <div class="slogan">on-chain commerce • Viction</div>
      </div>
    </div>

    <!-- Giá VIN theo USD -->
    <div class="vin-price">
      <span>1 VIN ≈ </span><strong id="vinPriceUsd">—</strong><span> USD</span>
    </div>

    <!-- Kết nối ví -->
    <div class="wallet-box">
      <button id="btnConnect" class="btn primary">Kết nối ví</button>
      <div id="walletInfo" class="account hidden">
        <a id="accountShort" class="mono" target="_blank" rel="noopener">0x…</a>
        <span class="balance">VIN: <b id="vinBalance">0.0000</b> | VIC: <b id="vicBalance">0.0000</b></span>
        <div class="row gap">
          <button id="btnRegister" class="btn ghost small">Đăng ký (0.001 VIN)</button>
          <button id="btnCreateProduct" class="btn small hidden">Đăng sản phẩm</button>
          <button id="btnDisconnect" class="btn ghost small">Ngắt</button>
        </div>
      </div>
    </div>
  </header>

  <!-- =================== MAIN =================== -->
  <main class="container">
    <div class="searchBar">
      <input id="searchInput" type="search" class="input" placeholder="Tìm sản phẩm..." />
      <button id="btnReload" class="btn">Tìm</button>
    </div>

    <div id="productList" class="grid"></div>
    <p id="emptyProducts" class="muted" style="margin-top:.5rem;">Chưa có sản phẩm.</p>
  </main>

  <!-- =================== FOOTER =================== -->
  <footer class="footer">
    <div class="container">
      <div class="links">
        <a href="https://vicscan.xyz/address/0xe01e2213A899E9B3b1921673D2d13a227a8df638#code" target="_blank" rel="noopener">Hợp đồng Muaban</a>
        <a href="https://vicscan.xyz/token/0x941F63807401efCE8afe3C9d88d368bAA287Fac4" target="_blank" rel="noopener">VIN token</a>
        <a href="https://vicscan.xyz" target="_blank" rel="noopener">VicScan</a>
      </div>
    </div>
  </footer>

  <!-- =================== TEMPLATE SẢN PHẨM =================== -->
  <template id="tplProductCard">
    <article class="card product">
      <div class="p-img-wrap"><img class="p-img" alt="" /></div>
      <div class="p-body">
        <h3 class="p-title"></h3>
        <p class="p-desc"></p>
        <div class="p-meta">
          <span class="p-price"></span>
          <span class="p-tax"></span>
          <span class="p-delivery"></span>
        </div>
        <div class="p-seller">
          <a class="p-seller-addr mono" target="_blank" rel="noopener"></a>
        </div>
        <div class="row gap">
          <button class="btn buy-btn hidden">Mua</button>
          <button class="btn update-btn hidden">Cập nhật</button>
        </div>
      </div>
    </article>
  </template>

  <!-- =================== MODAL TẠO SẢN PHẨM =================== -->
  <div id="createModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="createTitle">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="createTitle">Tạo sản phẩm</h3>
        <button id="createClose" class="icon-btn" aria-label="Đóng">×</button>
      </div>
      <div class="modal-body">
        <form id="createForm" class="grid grid-2">
          <label>Tên hàng<input id="pName" class="input" required maxlength="64" /></label>
          <label>Ảnh (IPFS CID)<input id="pImageCID" class="input" required /></label>
          <label>Mô tả (IPFS CID)<input id="pDescCID" class="input" required /></label>
          <label>Giá (USD)<input id="pPriceUsd" class="input" type="number" step="0.01" min="0.01" required /></label>
          <label>Phí ship (USD)<input id="pShippingUsd" class="input" type="number" step="0.01" min="0" value="0" /></label>
          <label>Thuế (%)<input id="pTaxPercent" class="input" type="number" step="0.01" min="0" value="0" /></label>
          <label>Thời hạn giao (ngày)<input id="pDeliveryDays" class="input" type="number" min="1" value="7" /></label>
          <label>Tồn kho<input id="pStock" class="input" type="number" min="0" value="0" /></label>
          <label>Ví doanh thu<input id="pRevenueWallet" class="input" placeholder="0x…" required /></label>
          <label>Ví thuế<input id="pTaxWallet" class="input" placeholder="0x…" required /></label>
          <label>Ví phí giao hàng (tuỳ chọn)<input id="pShippingWallet" class="input" placeholder="0x…" /></label>
          <label>Seller Public Key (hex bytes)<textarea id="pSellerPubKey" class="input" rows="3" placeholder="0x…" required></textarea></label>
          <label>Kích hoạt ngay?
            <select id="pActive" class="input">
              <option value="true" selected>Có</option>
              <option value="false">Chưa</option>
            </select>
          </label>
        </form>
      </div>
      <div class="modal-foot">
        <button id="createCancel" class="btn ghost">Huỷ</button>
        <button id="createSubmit" class="btn success">Đăng sản phẩm</button>
      </div>
    </div>
  </div>

  <!-- =================== MODAL MUA HÀNG =================== -->
  <div id="buyModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="buyTitle">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="buyTitle">Xác nhận mua</h3>
        <button id="buyClose" class="icon-btn" aria-label="Đóng">×</button>
      </div>
      <div class="modal-body">
        <div class="grid grid-2">
          <label>Sản phẩm<input id="buyName" class="input" disabled /></label>
          <label>Giá hàng (USD)<input id="buyPriceUsd" class="input" type="number" step="0.01" disabled /></label>
          <label>Phí ship (USD)<input id="buyShipUsd" class="input" type="number" step="0.01" disabled /></label>
          <label>Thuế (%)<input id="buyTaxRate" class="input" type="number" step="0.01" disabled /></label>
          <label>Số lượng<input id="buyQty" class="input" type="number" min="1" value="1" /></label>
          <div></div>
          <label>Tổng (USD)<input id="buyTotalUsd" class="input" disabled /></label>
          <label>Tổng quy đổi (VIN)<input id="buyTotalVin" class="input" disabled /></label>
        </div>
        <hr />
        <div class="grid grid-2">
          <label>Tên người nhận<input id="shipName" class="input" required /></label>
          <label>Số điện thoại<input id="shipPhone" class="input" required /></label>
          <label class="grid-span-2">Địa chỉ giao hàng<textarea id="shipAddress" class="input" rows="3" required></textarea></label>
          <label class="grid-span-2">Ghi chú (tuỳ chọn)<textarea id="shipNote" class="input" rows="2"></textarea></label>
        </div>
      </div>
      <div class="modal-foot">
        <button id="buyCancel" class="btn ghost">Huỷ</button>
        <button id="buySubmit" class="btn primary">Thanh toán</button>
      </div>
    </div>
  </div>

  <!-- =================== TOAST =================== -->
  <div id="toast" class="toast hidden">—</div>

  <!-- =================== SCRIPTS =================== -->
  <!-- LƯU Ý: bỏ integrity để tránh bị chặn script nếu SRI lệch -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
