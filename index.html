<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Muaban.vin - Thương mại điện tử trên Blockchain</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="app.js" defer></script>
</head>
<body>
  <header class="header container">
    <div class="brand">
      <img src="logo.png" alt="Muaban" class="logo" />
      <div class="brand-text">
        <h1 class="brand-title">Muaban.vin</h1>
        <p class="brand-sub">Thương mại điện tử trên Blockchain</p>
      </div>
    </div>
    <div class="header-right">
      <span id="vinPriceUsd">Loading...</span>
      <div class="wallet-box">
        <button id="btnConnect" class="btn primary">Kết nối ví</button>
        <div id="walletInfo" class="account hidden">
          <a id="accountShort" class="mono" target="_blank" rel="noopener">0x…</a>
          <span class="balance">VIN: <b id="vinBalance">0.0000</b> | VIC: <b id="vicBalance">0.0000</b></span>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="productList"></div>
  </main>

  <!-- Modal Mua hàng -->
  <div id="buyModal" class="modal hidden">
    <div class="modal-box">
      <div class="modal-head">
        <h3>Mua hàng</h3>
        <button id="buyClose" class="icon-btn">✕</button>
      </div>
      <div class="modal-body">
        <label>Số lượng</label>
        <input id="buyQty" type="number" min="1" value="1" />

        <div id="buyVinPreview">Total VIN: 0</div>
        <div id="buyVinBreakdown"></div>

        <label>Địa chỉ người nhận</label>
        <input id="shipName" type="text" placeholder="Tên người nhận" />
        <input id="shipPhone" type="text" placeholder="Số điện thoại" />
        <textarea id="shipAddress" placeholder="Địa chỉ giao hàng"></textarea>
        <input id="shipNote" type="text" placeholder="Lưu ý (tuỳ chọn)" />
      </div>
      <div class="modal-foot">
        <button id="buyCancel" class="btn ghost">Hủy</button>
        <button id="buySubmit" class="btn primary">Thanh toán</button>
      </div>
    </div>
  </div>

  <!-- Toast thông báo -->
  <div id="toast" class="toast hidden"></div>

  <!-- Template sản phẩm -->
  <template id="tplProductCard">
    <div class="product-card">
      <div class="p-media"></div>
      <div class="p-info">
        <h4 class="p-title"></h4>
        <div class="p-price-vin"></div>
        <button class="buy-btn hidden">Mua</button>
        <button class="update-btn hidden">Cập nhật</button>
        <div class="stock-badge"></div>
      </div>
    </div>
  </template>

  <!-- Template đơn hàng -->
  <template id="tplBuyerOrder">
    <div class="order-card">
      <div class="order-info">
        <h4 class="p-title"></h4>
        <div class="p-price-vin"></div>
        <button class="confirm-btn btn primary hidden">Xác nhận nhận hàng</button>
        <button class="refund-btn btn ghost hidden">Hoàn tiền</button>
      </div>
      <div class="muted mono"></div>
      <div class="shipping-plain hidden"></div>
      <button class="decrypt-btn">Hiển thị thông tin giao hàng</button>
    </div>
  </template>

  <template id="tplSellerOrder">
    <div class="order-card">
      <div class="order-info">
        <h4 class="p-title"></h4>
        <div class="p-price-vin"></div>
        <button class="confirm-btn btn primary hidden">Xác nhận nhận hàng</button>
        <button class="refund-btn btn ghost hidden">Hoàn tiền</button>
      </div>
      <div class="muted mono"></div>
      <div class="shipping-plain hidden"></div>
      <button class="decrypt-btn">Hiển thị thông tin giao hàng</button>
    </div>
  </template>
</body>
</html>
