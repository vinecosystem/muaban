<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Muaban — Giá cả tính theo USD thanh toán bằng VIN</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }
    main { flex: 1 0 auto; }
    .footer-nav { display:flex; gap:.75rem; flex-wrap:wrap; align-items:center }
    .footer-nav .link { opacity:.9; text-decoration:none }
    .price-chip { padding:.25rem .5rem; border:1px solid #3b3f51; border-radius:.5rem; font-variant-numeric: tabular-nums; }
    .muted { opacity:.7 }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <!-- ================ HEADER ================ -->
  <header class="site-header">
    <div class="container nav">
      <div class="brand">
        <img src="logo.png" alt="VIN" class="logo" />
        <div class="brand-text">
          <h1 class="brand-title">Muaban</h1>
          <p class="brand-sub">Pay with VIN · Viction</p>
        </div>
      </div>
      <div class="wallet-buttons">
        <button id="btnConnect" class="btn primary">Kết nối ví</button>
        <button id="btnDisconnect" class="btn ghost hidden">Ngắt</button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- ================ THÔNG TIN VÍ ================ -->
    <section id="walletInfo" class="card hidden connected-only">
      <div class="wallet-row">
        <div class="wallet-col">
          <a id="accountShort" class="badge mono" target="_blank" rel="noopener"></a>
        </div>
        <div class="wallet-col right">
          <span id="vinBalance" class="badge">—</span>
          <span id="vicBalance" class="badge">—</span>
        </div>
      </div>
      <div class="wallet-actions">
        <span id="statusLine" class="muted small">Đang kiểm tra trạng thái…</span>
        <button id="btnRegister" class="btn">Đăng ký</button>
      </div>
    </section>

    <!-- ================ SẢN PHẨM ================ -->
    <section class="section">
      <h2 class="section-title">Sản phẩm</h2>
      <div class="filters">
        <input id="searchInput" type="search" class="input" placeholder="Tìm sản phẩm…" />
        <select id="categorySelect" class="select">
          <option value="">Tất cả danh mục</option>
          <option value="hotel">Khách sạn</option>
          <option value="food">Đồ ăn</option>
          <option value="fashion">Thời trang</option>
          <option value="other">Khác</option>
        </select>
        <button id="btnReload" class="btn ghost">Tải lại</button>
      </div>
      <div id="productList" class="grid"></div>
      <p id="emptyProducts" class="muted" style="margin-top:.5rem;">Chưa có sản phẩm.</p>

      <template id="tplProductCard">
        <article class="card product">
          <div class="p-img-wrap"><img class="p-img" alt="" /></div>
          <div class="p-body">
            <h3 class="p-title"></h3>
            <p class="p-desc"></p>
            <div class="p-meta">
              <span class="p-price"></span>
              <span class="p-tax"></span>
            </div>
            <button class="btn buy-btn">Mua</button>
          </div>
        </article>
      </template>
    </section>

    <!-- ================ MODAL MUA HÀNG ================ -->
    <div id="buyModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="buyTitle">
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="buyTitle">Mua hàng</h3>
          <button id="buyClose" class="icon-btn" aria-label="Đóng">×</button>
        </div>
        <div class="modal-body">
          <div class="row"><label class="lbl">Sản phẩm</label><div id="buyName" class="val"></div></div>
          <div class="row"><label class="lbl">Giá (USD)</label><div id="buyPriceUsd" class="val"></div></div>
          <div class="row"><label class="lbl">Thuế (%)</label><div id="buyTaxRate" class="val"></div></div>
          <div class="row"><label class="lbl">Số lượng</label><input id="buyQty" type="number" class="input" min="1" value="1" /></div>
          <hr />
          <div class="row"><label class="lbl">Tổng (USD)</label><div id="buyTotalUsd" class="val mono"></div></div>
          <div class="row"><label class="lbl">Thanh toán (VIN)</label><div id="buyTotalVin" class="val mono"></div></div>
          <p class="muted small">* Tỷ giá lấy từ Binance: VIN = VIC × 100.</p>
        </div>
        <div class="modal-foot">
          <button id="buySubmit" class="btn primary">Xác nhận thanh toán</button>
          <button id="buyCancel" class="btn ghost">Hủy</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
  </main>

  <!-- ================ FOOTER ================ -->
  <footer class="site-footer">
    <div class="container footer-inner" style="gap:.75rem; justify-content:space-between">
      <div class="footer-nav">
        <a class="link" href="https://vicscan.xyz/address/0xe01e2213A899E9B3b1921673D2d13a227a8df638" target="_blank">Contract</a>
        <a class="link" href="https://vicscan.xyz/token/0x941F63807401efCE8afe3C9d88d368bAA287Fac4" target="_blank">VIN Token</a>
        <a class="link" href="https://frollswap.com" target="_blank">Swap VIN/VIC</a>
        <a class="link" href="https://github.com/vinecosystem/muaban" target="_blank">Hướng dẫn</a>
      </div>
      <div class="price-chip" id="vinUsdChip">1 VIN = <span id="vinUsd">Loading…</span></div>
    </div>
    <div class="container" style="margin-top:.25rem">
      <span class="muted">Transparent · On-Chain · Viction</span>
    </div>
  </footer>

  <!-- app logic -->
  <script defer src="app.js"></script>

  <!-- giá VIN theo USD = giá VIC × 100 -->
  <script>
    async function fetchVinUsd() {
      const el = document.getElementById('vinUsd');
      try {
        const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=VICUSDT', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const vicUsd = parseFloat(data.price);
        const vinUsd = vicUsd * 100;
        el.textContent = vinUsd.toFixed(4) + ' USD';
      } catch (e) {
        el.textContent = 'N/A';
        console.error('VIN/USD fetch error:', e);
      }
    }
    fetchVinUsd();
    setInterval(fetchVinUsd, 60000);
  </script>
</body>
</html>
