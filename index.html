<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>muaban.vin • on-chain commerce (Viction)</title>
  <link rel="icon" type="image/png" href="./logo.png" />
  <link rel="stylesheet" href="./style.css" />
  <!-- Ethers v5 -->
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <!-- Footer dính đáy & các tiện ích nhỏ -->
  <style>
    html, body { height:100%; }
    body { display:flex; flex-direction:column; }
    main { flex: 1 0 auto; }
    .hidden { display:none !important; }
    .header-right { display:flex; align-items:center; gap:.5rem; }
    .price-chip { padding:.3rem .6rem; border:1px solid #e2e8f0; border-radius:.5rem; background:#fff; font-variant-numeric:tabular-nums; }
    footer { flex-shrink:0; }
  </style>
</head>
<body>
  <!-- =================== HEADER =================== -->
  <header>
    <div class="wrap row" style="gap:10px">
      <div class="logo">
        <img src="./logo.png" alt="logo" />
        <div>
          <div>muaban.vin</div>
          <div class="tag">Giá theo VND • Thanh toán VIN</div>
        </div>
      </div>

      <div class="space"></div>

      <!-- Khu số dư: ẨN khi chưa kết nối -->
      <div id="balances" class="balances" hidden>
        <span class="badge">VIN: <b id="bal-vin">0.0000</b></span>
        <span class="badge">VIC: <b id="bal-vic">0.0000</b></span>
        <span class="badge mono" id="addr-short"></span>
      </div>

      <!-- Nút kết nối / ngắt -->
      <div class="header-right">
        <button id="btn-disconnect" class="btn ghost" hidden>Ngắt</button>
        <button id="btn-connect" class="btn">Kết nối ví</button>
      </div>
    </div>
  </header>

  <!-- =================== MAIN =================== -->
  <main class="wrap">
    <!-- Tỷ giá: chỉ hiển thị con số, bỏ mô tả công thức -->
    <section class="section">
      <span class="price-chip" id="vin-vnd">1 VIN = … VND</span>
    </section>

    <!-- Thanh công cụ + tìm kiếm -->
    <section class="section">
      <div class="row search">
        <input id="q" type="text" placeholder="Tìm sản phẩm theo tên…" />
        <button id="btn-search" class="btn secondary">Tìm</button>
        <div class="space"></div>

        <!-- Khi ĐÃ kết nối nhưng CHƯA đăng ký → chỉ hiện nút này -->
        <button id="btn-register" class="btn" hidden>Đăng ký</button>

        <!-- Khi ĐÃ đăng ký → hiện các nút sau -->
        <button id="btn-create" class="btn secondary" hidden>Đăng sản phẩm</button>
        <button id="btn-buyer-orders" class="btn ghost" hidden>Đơn hàng mua</button>
        <button id="btn-seller-orders" class="btn ghost" hidden>Đơn hàng bán</button>
      </div>
    </section>

    <!-- Danh sách sản phẩm -->
    <section class="section">
      <div id="list" class="grid"></div>
      <div id="empty" class="muted" style="margin-top:10px"></div>
    </section>
  </main>

  <!-- =================== FOOTER (luôn ở đáy) =================== -->
  <footer class="wrap section">
    <div class="links">
      <a id="link-contract" href="https://scan.viction.xyz/address/0x190FD18820498872354eED9C4C080cB365Cd12E0" target="_blank" rel="noopener">Hợp đồng</a>
      <a id="link-vin" href="https://scan.viction.xyz/token/0x941F63807401efCE8afe3C9d88d368bAA287Fac4" target="_blank" rel="noopener">VIN Token</a>
      <a id="link-swap" href="https://swap.viction.org/" target="_blank" rel="noopener">Swap VIN/VIC</a>
      <a href="https://vinecosystem.github.io/muaban/#huongdan" target="_blank" rel="noopener">Hướng dẫn</a>
    </div>
  </footer>

  <!-- =================== DIALOGS =================== -->

  <!-- Đăng ký -->
  <dialog id="dlg-register">
    <header class="wrap row">
      <div><b>Đăng ký tài khoản</b></div>
      <div class="space"></div>
      <button class="btn ghost" data-close="dlg-register">Đóng</button>
    </header>
    <div class="content">
      <p class="muted">Bạn cần đăng ký để có thể đăng sản phẩm & mua hàng.</p>
      <div class="row" style="margin-top:12px">
        <button id="btn-register-confirm" class="btn">Đăng ký</button>
        <div class="space"></div>
        <span id="register-msg" class="muted"></span>
      </div>
    </div>
  </dialog>

  <!-- Đăng sản phẩm (đơn giản hoá: chỉ 1 Link IPFS hiển thị) -->
  <dialog id="dlg-create">
    <header class="wrap row">
      <div><b>Đăng sản phẩm</b></div>
      <div class="space"></div>
      <button class="btn ghost" data-close="dlg-create">Đóng</button>
    </header>
    <div class="content">
      <form id="form-create">
        <div class="two">
          <div>
            <label>Tên sản phẩm (≤ 500 ký tự)</label>
            <input name="name" maxlength="500" required />
          </div>
          <div>
            <label>Đơn vị tính (hiển thị phụ, tuỳ chọn – không lưu on-chain)</label>
            <input name="unit" placeholder="cái, chiếc, hộp…" />
          </div>
        </div>
        <div>
          <label>Link IPFS (ảnh hoặc mô tả)</label>
          <!-- Chỉ 1 ô hiển thị; sẽ tự đồng bộ sang descriptionCID ẩn -->
          <input type="url" name="imageCID" id="ipfs-visible" placeholder="https://ipfs.io/ipfs/..." required />
          <input type="hidden" name="descriptionCID" id="ipfs-hidden" />
        </div>
        <div class="two">
          <div>
            <label>Giá bán (VND) — đã gồm thuế & phí</label>
            <input type="number" name="priceVND" min="1" step="1" required />
          </div>
          <div>
            <label>Thời gian giao hàng tối đa (ngày)</label>
            <input type="number" name="deliveryDaysMax" min="1" step="1" required />
          </div>
        </div>
        <div class="two">
          <div>
            <label>Ví nhận thanh toán</label>
            <input name="payoutWallet" placeholder="0x..." required />
          </div>
          <div>
            <label>Trạng thái khi đăng</label>
            <select name="active">
              <option value="true" selected>Đang bán</option>
              <option value="false">Tắt bán</option>
            </select>
          </div>
        </div>
        <div class="row" style="margin-top:12px">
          <button class="btn" type="submit">Đăng</button>
          <div class="space"></div>
          <span id="create-msg" class="muted"></span>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Cập nhật sản phẩm -->
  <dialog id="dlg-update">
    <header class="wrap row">
      <div><b>Cập nhật sản phẩm</b></div>
      <div class="space"></div>
      <button class="btn ghost" data-close="dlg-update">Đóng</button>
    </header>
    <div class="content">
      <form id="form-update">
        <input type="hidden" name="productId" />
        <div class="two">
          <div>
            <label>Giá bán (VND)</label>
            <input type="number" name="priceVND" min="1" step="1" required />
          </div>
          <div>
            <label>Thời gian giao hàng tối đa (ngày)</label>
            <input type="number" name="deliveryDaysMax" min="1" step="1" required />
          </div>
        </div>
        <div class="two">
          <div>
            <label>Ví nhận thanh toán</label>
            <input name="payoutWallet" placeholder="0x..." required />
          </div>
          <div>
            <label>Trạng thái bán</label>
            <select name="active">
              <option value="true">Đang bán</option>
              <option value="false">Tắt bán</option>
            </select>
          </div>
        </div>
        <div class="row" style="margin-top:12px">
          <button class="btn" type="submit">Lưu thay đổi</button>
          <div class="space"></div>
          <span id="update-msg" class="muted"></span>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Mua sản phẩm -->
  <dialog id="dlg-buy">
    <header class="wrap row">
      <div><b>Mua sản phẩm</b></div>
      <div class="space"></div>
      <button class="btn ghost" data-close="dlg-buy">Đóng</button>
    </header>
    <div class="content">
      <form id="form-buy">
        <input type="hidden" name="productId" />
        <div class="two">
          <div>
            <label>Họ tên người nhận</label>
            <input name="fullName" required />
          </div>
          <div>
            <label>Số điện thoại</label>
            <input name="phone" required />
          </div>
        </div>
        <div>
          <label>Địa chỉ giao hàng</label>
          <input name="address" required />
        </div>
        <div>
          <label>Phụ ghi (ghi chú)</label>
          <input name="note" placeholder="tuỳ chọn" />
        </div>
        <div class="two" style="margin-top:6px">
          <div>
            <label>Số lượng</label>
            <input type="number" name="quantity" id="buy-qty" min="1" step="1" value="1" required />
          </div>
          <div>
            <label>Tổng thanh toán (VIN)</label>
            <div class="price-chip mono" id="buy-total-vin">…</div>
          </div>
        </div>
        <div class="row" style="margin-top:12px">
          <button class="btn" type="submit">Thanh toán</button>
          <div class="space"></div>
          <span id="buy-msg" class="muted"></span>
        </div>
      </form>
    </div>
  </dialog>

  <!-- Close dialog via data-close -->
  <script>
    // Đóng dialog qua thuộc tính data-close
    document.addEventListener('click', (e) => {
      const id = e.target && e.target.getAttribute && e.target.getAttribute('data-close');
      if (id) { const dlg = document.getElementById(id); if (dlg && typeof dlg.close === 'function') dlg.close(); }
    });

    // Đơn giản hoá: nút "Ngắt" → reload trang để trở về trạng thái chưa kết nối
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('btn-disconnect');
      if (btn) btn.addEventListener('click', () => { location.reload(); });
    });

    // Đồng bộ 1 ô IPFS hiển thị sang descriptionCID ẩn (đáp ứng yêu cầu 1 link IPFS)
    document.addEventListener('DOMContentLoaded', () => {
      const vis = document.getElementById('ipfs-visible');
      const hid = document.getElementById('ipfs-hidden');
      if (vis && hid) {
        const sync = () => { hid.value = vis.value; };
        vis.addEventListener('input', sync);
        sync();
      }
    });
  </script>

  <!-- App logic -->
  <script src="./app.js"></script>

  <!-- Cấu hình để app.js đọc nếu cần -->
  <script>
    window.__MUABAN_CONFIG__ = {
      CHAIN_ID: 88,
      MUABAN_ADDR: "0x190FD18820498872354eED9C4C080cB365Cd12E0",
      VIN_ADDR: "0x941F63807401efCE8afe3C9d88d368bAA287Fac4"
    };
  </script>
</body>
</html>
